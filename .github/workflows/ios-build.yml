name: LyricDrive CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  PROJECT: LyricDrive.xcodeproj
  SCHEME: LyricDrive

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show trigger type
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "IPA will be built at the end of this job (same job, not skipped)."

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Validate App Icon
        run: |
          ICON="LyricDrive/Resources/Assets.xcassets/AppIcon.appiconset/AppIcon.png"
          test -f "$ICON" || { echo "::error::Missing $ICON"; exit 1; }
          WIDTH=$(sips -g pixelWidth "$ICON" | awk '/pixelWidth/ {print $2}')
          HEIGHT=$(sips -g pixelHeight "$ICON" | awk '/pixelHeight/ {print $2}')
          echo "App icon size: ${WIDTH}x${HEIGHT}"
          if [ "$WIDTH" != "1024" ] || [ "$HEIGHT" != "1024" ]; then
            echo "::error::App icon must be exactly 1024x1024 (found ${WIDTH}x${HEIGHT})"
            exit 1
          fi

      - name: List available simulators
        run: xcrun simctl list devices available

      - name: Resolve iOS Simulator
        id: sim
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys

          runtimes_json = subprocess.run(
              ["xcrun", "simctl", "list", "runtimes", "available", "-j"],
              capture_output=True, text=True, check=True,
          )
          runtimes = json.loads(runtimes_json.stdout)["runtimes"]
          ios = [r for r in runtimes if r.get("isAvailable") and "iOS" in r.get("name", "")]
          ios.sort(key=lambda r: r["version"], reverse=True)
          if not ios:
              print("No iOS runtime found", file=sys.stderr)
              sys.exit(1)
          runtime_id = ios[0]["identifier"]

          devices_json = subprocess.run(
              ["xcrun", "simctl", "list", "devices", "available", "-j"],
              capture_output=True, text=True, check=True,
          )
          devices = json.loads(devices_json.stdout)["devices"].get(runtime_id, [])
          iphones = [d for d in devices if d.get("isAvailable") and "iPhone" in d.get("name", "")]
          prefer = ("iPhone 16 Pro", "iPhone 16", "iPhone 15 Pro", "iPhone 15", "iPhone SE")
          udid = None
          for name in prefer:
              for d in iphones:
                  if d["name"].startswith(name):
                      udid = d["udid"]
                      break
              if udid:
                  break
          if not udid and iphones:
              udid = iphones[0]["udid"]
          if not udid:
              print("No iPhone simulator found", file=sys.stderr)
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"udid={udid}\n")
          print(f"Using simulator UDID: {udid} (runtime: {runtime_id})")
          PYEOF

      - name: Boot simulator
        run: |
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" 2>/dev/null || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      - name: Build (Simulator)
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -resultBundlePath "$RUNNER_TEMP/TestResults.xcresult"

      - name: Build unsigned IPA for iPhone (Sideloadly signs it)
        run: |
          BUILD_DIR="$RUNNER_TEMP/iphoneos-build"
          mkdir -p "$BUILD_DIR"

          xcodebuild build \
            -project LyricDrive.xcodeproj \
            -scheme LyricDrive \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SYMROOT="$BUILD_DIR"

          APP_PATH=$(find "$BUILD_DIR" -name "LyricDrive.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::LyricDrive.app not found after build"
            find "$BUILD_DIR" -type d -name "*.app"
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          mkdir -p Payload
          cp -r "$APP_PATH" Payload/LyricDrive.app
          zip -r "$RUNNER_TEMP/LyricDrive.ipa" Payload
          ls -la "$RUNNER_TEMP/LyricDrive.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricDrive-ipa
          path: ${{ runner.temp }}/LyricDrive.ipa
          if-no-files-found: error

      - name: Done
        run: |
          echo "=============================================="
          echo "Download LyricDrive-ipa from ARTIFACTS above."
          echo "Install on iPhone with Sideloadly + Apple ID."
          echo "No Team ID or GitHub secrets needed."
          echo "=============================================="
