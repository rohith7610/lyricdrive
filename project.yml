name: LyricDrive
options:
  bundleIdPrefix: com.lyricdrive
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  LyricDrive:
    type: application
    platform: iOS
    sources:
      - LyricDrive
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lyricdrive.app
        INFOPLIST_FILE: LyricDrive/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: LyricDrive/Resources/LyricDrive.entitlements
        GENERATE_INFOPLIST_FILE: false
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.2.2
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - target: LyricDriveWidget
        embed: true

  LyricDriveWidget:
    type: app-extension
    platform: iOS
    sources:
      - LyricDriveWidget
      - path: LyricDrive/Shared
        group: Shared
    settings:
      base:
        PRODUCT_NAME: LyricDriveWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.lyricdrive.app.widget
        INFOPLIST_FILE: LyricDriveWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: LyricDriveWidget/LyricDriveWidget.entitlements
        GENERATE_INFOPLIST_FILE: false
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.2.2
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"

  LyricDriveTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - LyricDriveTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lyricdrive.app.tests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: LyricDrive

schemes:
  LyricDrive:
    build:
      targets:
        LyricDrive: all
        LyricDriveTests: [test]
    test:
      targets:
        - LyricDriveTests
